<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Time Pokémon OBS (Overlay)</title>
    <!-- Inclui a biblioteca Socket.io do backend -->
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            /* Fundo transparente para o OBS */
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #slots-container {
            position: absolute;
            left: 8.5%;
            /* Push slightly further right */
            bottom: 2%;
            /* Sits very close to the bottom edge */
            width: 58%;
            /* The pokeballs take up roughly 58% of the full 1080p width */
            height: 15%;
            /* Container height */
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .slot {
            width: 15%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .pokeball {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 90%;
            aspect-ratio: 1;
            background: linear-gradient(to bottom, #ff3333 48%, #333 48%, #333 52%, #fff 52%);
            border-radius: 50%;
            border: 4px solid #333;
            box-sizing: border-box;
            box-shadow: 2px 3px 5px rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        .pokeball::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 25%;
            height: 25%;
            background: #fff;
            border-radius: 50%;
            border: 4px solid #333;
            box-sizing: border-box;
        }

        .pokemon-img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -60%);
            /* Sits exactly in the center, pushed just slightly up to stand on the ball */
            width: 140%;
            /* Make the pokemon bigger than the pokeball so it pops out */
            height: 140%;
            object-fit: contain;
            filter: drop-shadow(2px 3px 5px rgba(0, 0, 0, 0.6));
            display: none;
            transition: all 0.3s ease;
            z-index: 2;
        }

        /* Animaçãozinha leve quando um pokemon entra no time */
        .fade-in {
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Área clicável e Modal para caso use sem servidor */
        .click-area {
            position: absolute;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 10;
        }

        #modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        #modal-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            width: 300px;
            font-family: Arial, sans-serif;
        }

        #modal-box h3 {
            margin-top: 0;
            color: #333;
        }

        #modal-box input {
            padding: 10px;
            font-size: 16px;
            margin: 15px 0;
            width: 80%;
            border: 2px solid #ccc;
            border-radius: 5px;
            text-align: center;
        }

        .btn-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        #modal-box button {
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
        }

        .btn-confirm {
            background-color: #28a745;
        }

        .btn-clear {
            background-color: #dc3545;
        }

        .btn-cancel {
            background-color: #6c757d;
        }
    </style>
</head>

<body>

    <!-- Overlay do Modal (usado ao clicar direto no OBS) -->
    <div id="modal-overlay">
        <div id="modal-box">
            <h3>Escolha o Pokémon</h3>
            <input type="text" id="poke-input" placeholder="Nome em inglês ou Nº" autocomplete="off">
            <div class="btn-row">
                <button class="btn-confirm" onclick="confirmarPokemon()">Confirmar</button>
                <button class="btn-clear" onclick="limparPokemonModal()">Limpar Espaço</button>
                <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="slots-container"></div>

    <script>
        // Cria a interface no HTML
        const container = document.getElementById('slots-container');
        container.innerHTML = Array.from({ length: 6 }, (_, i) => `
            <div class="slot">
                <div class="click-area" onclick="abrirModal(${i})" title="Vaga ${i + 1}"></div>
                <div class="pokeball"></div>
                <img id="poke-${i}" class="pokemon-img" src="" alt="Pokemon ${i + 1}">
            </div>
        `).join('');

        let slotAtual = -1;

        // Tenta carregar do localStorage imediatamente para não piscar a tela
        for (let i = 0; i < 6; i++) {
            let saved = localStorage.getItem('obs_slot_' + i);
            if (saved) {
                atualizarImagem(i, saved, false);
            }
        }

        // Conecta ao servidor (mesmo domínio/porta) SE estiver usando Node.js
        const socket = typeof io !== 'undefined' ? io() : null;

        if (socket) {
            // O servidor avisa que a equipe mudou (recebe todos os 6)
            socket.on('teamUpdate', (team) => {
                console.log("Time atualizado recebido do Admin:", team);
                team.forEach((pokemonName, index) => {
                    atualizarImagem(index, pokemonName, true);
                });
            });
        }

        // ==========================================
        // Funções do Modal Manual (clique direto no OBS)
        // ==========================================
        function abrirModal(index) {
            slotAtual = index;
            document.getElementById('modal-overlay').style.display = 'flex';
            const input = document.getElementById('poke-input');
            input.value = localStorage.getItem('obs_slot_' + index) || '';
            input.focus();
        }

        function fecharModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        function confirmarPokemon() {
            let valor = document.getElementById('poke-input').value.trim().toLowerCase();
            if (valor !== "") {
                atualizarImagem(slotAtual, valor, true);
                if (socket) socket.emit('updateSlot', { index: slotAtual, pokemon: valor });
            } else {
                limparPokemonModal();
                return;
            }
            fecharModal();
        }

        function limparPokemonModal() {
            atualizarImagem(slotAtual, "", true);
            if (socket) socket.emit('clearSlot', slotAtual);
            fecharModal();
        }

        document.getElementById('poke-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') confirmarPokemon();
        });

        document.getElementById('modal-overlay').addEventListener('click', function (e) {
            if (e.target === this) fecharModal();
        });

        // ==========================================
        // Lógica de carregar as imagens
        // ==========================================
        function atualizarImagem(index, identificador, saveLocal = true) {
            if (saveLocal) {
                if (!identificador || identificador.trim() === "") {
                    localStorage.removeItem('obs_slot_' + index);
                } else {
                    localStorage.setItem('obs_slot_' + index, identificador);
                }
            }

            let img = document.getElementById('poke-' + index);

            // Se veio vazio, limpa e esconde
            if (!identificador || identificador.trim() === "") {
                img.style.display = 'none';
                img.src = "";
                return;
            }

            identificador = identificador.toLowerCase().trim();

            // Uma fonte de dados com modelos 3D estáticos em alta qualidade (PNG)
            const sourceShowdownDex = `https://projectpokemon.org/images/normal-sprite/${identificador}.gif`;

            // Verifica se a imagem já é essa pra não ficar piscando à toa
            if (img.src === sourceShowdownDex) return;

            img.style.display = 'block';
            img.classList.remove('fade-in');

            // Força a animação de entrada
            void img.offsetWidth;
            img.classList.add('fade-in');

            // Tenta carregar a melhor/maior qualidade primeiro
            img.src = sourceShowdownDex;

            // Sistema de Fallback (Se a imagem não existir na fonte 1, vai tentar a 2, 3, etc)
            img.onerror = function () {
                if (this.src.includes(\'dex/\')) {
                    // Fallback 1: PNG Estático da PokeAPI
                    this.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${identificador}.png`;
                } else {
                    // Se falhar tudo (nome errado), esconde
                    this.style.display = 'none';
                }
            };
        }
    </script>
</body>

</html>
